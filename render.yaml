databases:
  - name: replybot-db
    databaseName: replybot
    user: replybot
    plan: free

services:
  - type: keyvalue
    name: replybot-redis
    plan: free

  - type: web
    name: replybot-web
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: replybot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: replybot-redis
          type: keyvalue
          property: connectionString
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: INSTAGRAM_WEBHOOK_VERIFY_TOKEN
        value: my_super_secret_webhook_password_123
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: worker
    name: replybot-worker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: replybot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: replybot-redis
          type: keyvalue
          property: connectionString
